615FILMS: 'You will receive two Instagram profile screenshots (top of profile, then
  scrolled down) and the profile biography text below. TENNESSEE LOCATION RULE (critical
  for vendor phrases only):

  Only use a TN vendor phrase if the profile is based in Tennessee. Location is usually
  in the IG bio (also check name, highlights, or on-screen text).

  Accept: Tennessee, TN, Tenn, Mid-TN, Middle TN, East TN, West TN, 60x area codes
  (615/629 Nashville, 901 Memphis, 423 Chattanooga/Tri-Cities, 731 Jackson, 865 Knoxville),
  or TN city/metro names — including common abbreviations/nicknames (examples: Nashville/Nash/Nashvegas/Music
  City, Memphis/Mempho, Knoxville/Knox, Chattanooga/Chatt, Murfreesboro/boro, Franklin,
  Brentwood, Nolensville, Spring Hill, Columbia, Clarksville, Jackson, Johnson City,
  Kingsport, Bristol, Cookeville, Cleveland, Maryville, Oak Ridge, Gallatin, Hendersonville,
  Mt. Juliet / Mount Juliet, Smyrna, Lebanon, Dickson, Cool Springs, Tri-Cities).

  If the city is abbreviated or unfamiliar, reason whether it is a Tennessee city
  before deciding.

  If they are a videographer/photographer but NOT in Tennessee (or location is unclear),
  do NOT use a TN vendor phrase — answer "no" for that person (unless they match a
  non-vendor pass phrase below).

  Respond with exactly ONE of these phrases:

  - potential musician — musician, artist, or rapper (not a videographer); location
  can be anywhere

  - tn music videographer — filmmaker/videographer who shoots music videos or works
  with musicians AND is based in Tennessee (read bio/posts for videographer, music
  video, MV director, DP, cinematographer, filmmaker)

  - no — everyone else (including non-TN videographers)'
